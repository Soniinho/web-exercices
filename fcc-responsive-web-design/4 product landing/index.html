<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- https://product-landing-page.freecodecamp.rocks -->
    <!-- "https://www.adaptivewfs.com/wp-content/uploads/2020/07/logo-placeholder-image.png" -->
    <title>Product Landing Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="page-wrapper">
      <header id="header">
        <div class="logo">
          <img
            src="https://www.adaptivewfs.com/wp-content/uploads/2020/07/logo-placeholder-image.png"
            alt="Logo"
            id="header-img"
          />
        </div>
        <nav id="nav-bar">
          <ul>
            <li><a class="nav-link" href="#header">Start</a></li>
            <li><a class="nav-link" href="#video">Video</a></li>
            <li><a class="nav-link" href="#form">Form</a></li>
          </ul>
        </nav>
      </header>

      <div class="container"></div>

      <section id="hero">
        <h2>Products</h2>
        <form id="form" action="https://www.freecodecamp.org/email-submit">
          <input type="email" name="email" id="email" placeholder="Email:" />
          <input id="submit" type="submit" value="Get Started" />
        </form>
      </section>

      <section id="how-it-works">
        <iframe
          id="video"
          height="315"
          src="https://www.youtube-nocookie.com/embed/y8Yv4pnO7qc?rel=0&amp;controls=0&amp;showinfo=0"
          frameborder="0"
          allowfullscreen=""
        ></iframe>
      </section>
    </main>
  </body>
</html>
