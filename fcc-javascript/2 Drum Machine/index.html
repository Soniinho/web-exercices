<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Machine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="inner-container" id="drum-machine">
      <div id="pad-bank">
        <button type="button" id="heater-1" class="drum-pad">
          Q
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-1.mp3"
            id="Q"
          ></audio>
        </button>
        <button type="button" id="heater-2" class="drum-pad">
          W
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-2.mp3"
            id="W"
          ></audio>
        </button>
        <button type="button" id="heater-3" class="drum-pad">
          E
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-3.mp3"
            id="E"
          ></audio>
        </button>
        <button type="button" id="heater-4" class="drum-pad">
          A
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-4_1.mp3"
            id="A"
          ></audio>
        </button>
        <button type="button" id="clap" class="drum-pad">
          S
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-6.mp3"
            id="S"
          ></audio>
        </button>
        <button type="button" id="open-HH" class="drum-pad">
          D
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Dsc_Oh.mp3"
            id="D"
          ></audio>
        </button>
        <button type="button" id="kick-n-Hat" class="drum-pad">
          Z
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Kick_n_Hat.mp3"
            id="Z"
          ></audio>
        </button>
        <button type="button" id="kick" class="drum-pad">
          X
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/RP4_KICK_1.mp3"
            id="X"
          ></audio>
        </button>
        <button type="button" id="closed-HH" class="drum-pad">
          C
          <audio
            class="clip"
            src="https://cdn.freecodecamp.org/curriculum/drum/Cev_H2.mp3"
            id="C"
          ></audio>
        </button>
      </div>
      <p id="display"></p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
